name: "Release"
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    uses: ./.github/workflows/generic_build.yml
  create_release:
    needs: build
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - name: "Create Release"
        uses: elgohr/Github-Release-Action@v5
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: ${{ github.ref }}
          tag:  ${{ github.ref }}